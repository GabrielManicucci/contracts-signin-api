version: "3.8"
services:
  db:
    image: postgres:15
    container_name: contracts_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: contracts_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    image: contracts-signin-api
    container_name: contracts_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://root:rootpassword@db:5432/contracts_db?schema=public
      - PORT=3000
    depends_on:
      - db

volumes:
  postgres_data:
